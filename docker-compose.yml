services:
  postgres:
    image: postgres:16-alpine
    container_name: wyzauto-postgres
    environment:
      POSTGRES_USER: wyzauto
      POSTGRES_PASSWORD: wyzauto
      POSTGRES_DB: wyzauto
    ports:
      - "5432:5432"
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wyzauto -d wyzauto"]
      interval: 5s
      timeout: 3s
      retries: 10
